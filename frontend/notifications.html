<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps AI - Alert Center</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Custom stylesheet link -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-[#0F172A] text-slate-100 font-sans">
  
  <div id="layout-wrapper" class="flex min-h-screen">
    <main id="main-content" class="flex-1 p-6 space-y-6">
      
      <!-- Page Header -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
            Operations Alert Console
          </h1>
          <p class="text-xs text-slate-400 mt-1">Audit active telematics flags, CDL expires alerts, and critical mechanical diagnostics alerts.</p>
        </div>

        <button id="clear-notifications-btn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 rounded-lg text-xs font-semibold transition duration-150">
          Dismiss All Active Alerts
        </button>
      </div>

      <!-- Filters Rail -->
      <div class="bg-[#1E293B] border border-slate-800 p-4 rounded-xl flex flex-col sm:flex-row justify-between items-center gap-4 shadow-lg">
        <!-- Tabs selectors -->
        <div class="flex flex-wrap gap-2" id="alert-filters-tab">
          <button class="alert-tab-btn active px-3.5 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 text-white" data-filter="ALL">All Alerts</button>
          <button class="alert-tab-btn px-3.5 py-1.5 rounded-lg text-xs font-semibold text-slate-400 hover:text-slate-200" data-filter="critical">Critical</button>
          <button class="alert-tab-btn px-3.5 py-1.5 rounded-lg text-xs font-semibold text-slate-400 hover:text-slate-200" data-filter="warning">Warnings</button>
        </div>
        <span class="text-[10px] text-slate-500 font-mono">SECURE TELEMETRY ALERT STREAM</span>
      </div>

      <!-- Alerts List card -->
      <div class="bg-[#1E293B] border border-slate-800 rounded-xl overflow-hidden shadow-2xl">
        <div class="divide-y divide-slate-800" id="notifications-list-container">
          <!-- Dynamically populated via JS -->
        </div>
      </div>

    </main>
  </div>

  <script src="/components/layout.js"></script>
  <script src="/js/notifications.js"></script>
</body>
</html>
