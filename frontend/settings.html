<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitOps AI - System Configurations</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Custom stylesheet link -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-[#0F172A] text-slate-100 font-sans">
  
  <div id="layout-wrapper" class="flex min-h-screen">
    <main id="main-content" class="flex-1 p-6 space-y-6">
      
      <!-- Page Header -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
            System Configurations
          </h1>
          <p class="text-xs text-slate-400 mt-1">Configure telemetry server connection streams, adjust algorithmic predictive variables, and manage system features.</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Feature Toggles Panel -->
        <div class="lg:col-span-8 bg-[#1E293B] border border-slate-800 p-5 rounded-xl shadow-2xl space-y-6">
          <div>
            <h2 class="text-sm font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center gap-2">
              <i data-lucide="sliders" class="w-4 h-4 text-blue-400"></i>
              Algorithmic & Feature Controls
            </h2>
          </div>

          <div class="space-y-4 text-xs font-semibold">
            <label class="flex items-center justify-between p-3 rounded-lg bg-slate-900/40 border border-slate-800 cursor-pointer hover:border-slate-700 select-none">
              <div class="space-y-0.5 pr-4">
                <span class="text-slate-200 block">Autonomous Shortest Path Dispatch (Dijkstra)</span>
                <span class="text-[10px] text-slate-500 font-medium block leading-relaxed">Let the routing engines automatically propose minimum node routes matching vehicle capabilities.</span>
              </div>
              <input type="checkbox" id="toggle-dijkstra" class="w-4.5 h-4.5 rounded border-slate-800 bg-slate-900 text-blue-600 focus:ring-0 cursor-pointer" checked>
            </label>

            <label class="flex items-center justify-between p-3 rounded-lg bg-slate-900/40 border border-slate-800 cursor-pointer hover:border-slate-700 select-none">
              <div class="space-y-0.5 pr-4">
                <span class="text-slate-200 block">Enable High Vibration Alerts (Gemini AI Models)</span>
                <span class="text-[10px] text-slate-500 font-medium block leading-relaxed">Deploy real-time analysis scan parameters over vehicle coolant impeller sensors.</span>
              </div>
              <input type="checkbox" id="toggle-vibration" class="w-4.5 h-4.5 rounded border-slate-800 bg-slate-900 text-blue-600 focus:ring-0 cursor-pointer" checked>
            </label>

            <label class="flex items-center justify-between p-3 rounded-lg bg-slate-900/40 border border-slate-800 cursor-pointer hover:border-slate-700 select-none">
              <div class="space-y-0.5 pr-4">
                <span class="text-slate-200 block">Enforce SMS Telematics to drivers</span>
                <span class="text-[10px] text-slate-500 font-medium block leading-relaxed">Broadcast encrypted dispatch updates and safety violation alerts straight to CDL pilot devices.</span>
              </div>
              <input type="checkbox" id="toggle-sms" class="w-4.5 h-4.5 rounded border-slate-800 bg-slate-900 text-blue-600 focus:ring-0 cursor-pointer">
            </label>
          </div>
        </div>

        <!-- Connection settings -->
        <div class="lg:col-span-4 bg-[#1E293B] border border-slate-800 p-5 rounded-xl shadow-2xl space-y-4">
          <div>
            <h2 class="text-sm font-bold text-slate-200 border-b border-slate-800 pb-2 flex items-center gap-2">
              <i data-lucide="radio" class="w-4 h-4 text-cyan-400"></i>
              Telematics Connection Parameters
            </h2>
          </div>

          <form id="settings-conn-form" class="space-y-4 text-xs font-semibold">
            <div>
              <label class="block text-[10px] uppercase text-slate-500 tracking-wider mb-1">GPS Telemetry Stream Host</label>
              <input type="text" id="conn-host" class="w-full bg-slate-900 border border-slate-800 text-xs text-slate-300 rounded px-3 py-2 outline-none font-mono focus:border-cyan-500" value="telemetry-dallas.transitops.ai">
            </div>

            <div>
              <label class="block text-[10px] uppercase text-slate-500 tracking-wider mb-1">Connection Port</label>
              <input type="number" id="conn-port" class="w-full bg-slate-900 border border-slate-800 text-xs text-slate-300 rounded px-3 py-2 outline-none font-mono focus:border-cyan-500" value="8082">
            </div>

            <div>
              <label class="block text-[10px] uppercase text-slate-500 tracking-wider mb-1">Telematics Encryption Secret</label>
              <input type="password" id="conn-secret" class="w-full bg-slate-900 border border-slate-800 text-xs text-slate-300 rounded px-3 py-2 outline-none font-mono focus:border-cyan-500" value="transitops-sha256-security-token-2026">
            </div>

            <button type="submit" class="w-full py-2.5 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition-colors shadow">
              Validate & Synchronize Servers
            </button>
          </form>
        </div>

      </div>

    </main>
  </div>

  <script src="/components/layout.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
